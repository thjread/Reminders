<!DOCTYPE html>
<html lang="en" >
    <head>
        <meta charset="utf-8" >
        <!-- interactive-widget: make the on-screen keyboard shrink the layout
             viewport again (pre-Chrome-108 behaviour) so the short-height
             keyboard layout in main.css can kick in -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
        <meta name="Description" content="Reminders web-app">
        <meta name="theme-color" content="#9ed36a">
        <title>Reminders</title>
        <link rel="canonical" href="https://reminders.thjread.com/">
        <link rel="preload" href="images/logo.svg" as="image" type="image/svg+xml">
        <link rel="preload" href="https://fonts.gstatic.com/s/raleway/v13/1Ptrg8zYS_SKggPNwN4rWqZPAA.woff2" as="font" type="font/woff2" crossorigin="anonymous">
        <link rel="preload" href="https://fonts.gstatic.com/s/quattrocentosans/v11/va9c4lja2NVIDdIAAoMR5MfuElaRB0zJt08.woff2" as="font" type="font/woff2" crossorigin="anonymous">
        <link rel='shortcut icon' type='image/x-icon' href='favicon.ico'>
        <link rel="manifest" href="manifest.json">
    </head>
    <body class="content-font">
        <noscript><header class="noscript-header" >This web app requires javascript to function.</header></noscript>
        <script type="module" src="/src/index.ts"></script>
    </body>
</html>
